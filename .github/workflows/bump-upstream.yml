name: Bump upstream version

on:
  schedule:
    - cron: "00 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - "master"
      - "main"

jobs:
  bump-upstream:
    uses: dappnode/workflows/.github/workflows/bump-upstream.yml@master
    with:
      docker_tag_pattern: "multiarch-{version}"
    secrets: inherit
