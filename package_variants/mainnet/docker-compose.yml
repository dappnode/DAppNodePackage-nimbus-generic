version: "3.5"
services:
  beacon-validator:
    build:
      args:
        NETWORK: mainnet

  beacon-chain:
    build:
      args:
        NETWORK: mainnet
        P2P_PORT: 9106
    ports:
      - 9106:9106
      - 9106:9106/udp
    environment:
      CHECKPOINT_SYNC_URL: "https://checkpoint-sync.dappnode.net"
  validator:
    build:
      args:
        NETWORK: mainnet
