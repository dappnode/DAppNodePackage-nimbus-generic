version: "3.5"
services:
  beacon-validator:
    build:
      args:
        NETWORK: hoodi

  beacon-chain:
    build:
      args:
        NETWORK: hoodi
        P2P_PORT: 9806
    ports:
      - 9806:9806
      - 9806:9806/udp
    environment:
      CHECKPOINT_SYNC_URL: "https://checkpoint-sync-hoodi.dappnode.net"
  validator:
    build:
      args:
        NETWORK: hoodi
